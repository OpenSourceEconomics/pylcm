---
name: benchmark-check
on:
  pull_request:
    branches:
      - '*'
jobs:
  check-benchmarks:
    name: Check benchmark results exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |-
            const marker = '<!-- benchmark-check -->';
            const headSha = context.payload.pull_request.head.sha
              .slice(0, 8);
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              },
            );
            const found = comments.find(
              c => c.body.includes(marker),
            );
            if (!found) {
              core.setFailed(
                'No benchmark results found for this PR. ' +
                'Run `pixi run -e tests-cuda13 ' +
                'asv-run-and-pr-comment`.',
              );
              return;
            }
            const match = found.body.match(
              /<!-- head-sha:(\w+) -->/,
            );
            const commentSha = match ? match[1] : null;
            if (commentSha === headSha) {
              core.info(
                `Benchmark results are current (${headSha}).`,
              );
              return;
            }
            core.warning(
              `Benchmark comment is for ${commentSha}, ` +
              `but PR HEAD is ${headSha}. Consider ` +
              're-running benchmarks if recent commits ' +
              'may impact performance.',
            );
