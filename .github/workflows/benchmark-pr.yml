---
name: benchmark-pr
concurrency:
  group: gpu-benchmarks
  cancel-in-progress: false
on:
  pull_request:
    branches:
      - '*'
  workflow_dispatch: null
jobs:
  run-benchmarks:
    name: Run benchmarks on GPU
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      - self-hosted
      - gpu-benchmark
    steps:
      - name: Wait for GPU to be free
        run: |
          echo "Waiting for GPU to be free..."
          while nvidia-smi --query-compute-apps=process_name --format=csv,noheader \
                | grep -qi python; do
            echo "$(date): GPU in use by Python process, retrying in 60s..."
            sleep 60
          done
          echo "GPU is free."
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Ensure main ref exists
        run: git fetch origin main:main || true
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.2
          environments: tests-cuda13
          frozen: false
      - name: Setup ASV machine
        run: pixi run -e tests-cuda13 asv machine --yes
      - name: Run benchmarks and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: pixi run -e tests-cuda13 asv-run-and-pr-comment
