---
name: main
# Automatically cancel a previous run.
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - docs/**
      - benchmarks/**
      - '**.md'
      - '**.ipynb'
jobs:
  run-tests:
    name: Run tests for ${{ matrix.os }} on ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - '3.14'
        # The small macOS runner can't host four parallel JAX AOT compiles of the
        # DC-EGM solve/oracle battery (it swap-thrashes for hours). Drop the `slow`
        # set there; the platform-independent kernel stays covered on Linux + GPU.
        include:
          - os: macos-latest
            pytest_extra: -m "not slow"
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: tests-cpu
          activate-environment: true
          frozen: true
      - name: Run pytest
        shell: bash {0}
        run: pixi run -e tests-cpu tests ${{ matrix.pytest_extra }}
        if: runner.os != 'Linux' || matrix.python-version != '3.14'
      - name: Run pytest and collect coverage
        shell: bash {0}
        run: pixi run -e tests-cpu tests-with-cov
        if: runner.os == 'Linux' && matrix.python-version == '3.14'
      - name: Upload coverage report
        if: runner.os == 'Linux' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  run-ty:
    name: Run ty
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.14'
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: type-checking
          frozen: true
      - name: Run ty
        shell: bash {0}
        run: pixi run ty
  run-tests-gpu:
    name: Run tests on GPU
    # Config:
    # https://github.com/organizations/OpenSourceEconomics/settings/actions/runners
    # Docs on GPU runners:
    # https://docs.github.com/en/actions/using-github-hosted-runners/using-larger-runners
    runs-on: ubuntu-latest-gpu
    steps:
      - name: Check CUDA version
        run: |
          nvidia-smi
          nvcc --version || echo "nvcc not found"
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: tests-cuda12
          frozen: false
      - name: Run pytest on GPU
        shell: bash {0}
        # Run serially (-n0 overrides the task's -n 4): the single GPU runner is
        # starved of host CPU/memory by parallel JAX AOT compiles. CPU jobs keep -n 4.
        run: pixi run -e tests-cuda12 tests -n0
  run-tests-gpu-32bit:
    name: Run tests on GPU (32-bit precision)
    runs-on: ubuntu-latest-gpu
    steps:
      - name: Check CUDA version
        run: |
          nvidia-smi
          nvcc --version || echo "nvcc not found"
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: tests-cuda12
          frozen: false
      - name: Run pytest on GPU with 32-bit precision
        shell: bash {0}
        # Run serially (-n0 overrides the task's -n 4): the single GPU runner is
        # starved of host CPU/memory by parallel JAX AOT compiles. CPU jobs keep -n 4.
        run: pixi run -e tests-cuda12 tests-32bit -n0
  run-explanation-notebooks:
    name: Run explanation notebooks on Python 3.14
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: docs
          frozen: false
      - name: Run explanation notebooks
        shell: bash {0}
        run: pixi run -e docs explanation-notebooks
